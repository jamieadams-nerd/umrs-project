#-------------------------------------------------------------------------
# SETRANS.CONF // MLS Policy
#
# MCS Category-to-Label translation for systems running MLS policy.
# Sensitivity levels s1-s3 provide Bell-LaPadula dominance enforcement.
#
#-------------------------------------------------------------------------
# USAGE EXAMPLES
#
# Assign the base CUI umbrella to a file:
#   chcon -l s1:c0 /some/path/file
#
# Assign CUI with Law Enforcement / Accident Investigation:
#   chcon -l s1:c0,c91 /some/path/file
#
# Assign Canadian Protected B:
#   chcon -l s2:c201 /some/path/file
#
# Using chcat:
#   chcat -L             List all categories
#   chcat -d file        Remove all categories
#   chcat <cat> file     Set categories
#   chcat CUI//PRIV/CONTRACT /path/to/file
#
#   The label can be in double quotes or not.
#
#-------------------------------------------------------------------------
# BLOCK ALLOCATION MAP — Five Eyes MCS Category Ranges
#
#   c0        US CUI base umbrella
#   c1-c9     US PRIV — Privacy (9 subcategories)
#   c10-c19   US PROCURE — Procurement and Acquisition
#   c20-c29   US PROPIN — Proprietary Business Information
#   c30-c39   US EXPT — Export Control
#   c40-c49   US CRIT — Critical Infrastructure (overflows to c50)
#   c50-c59   US INTEL — Intelligence
#   c60-c69   US DEF — Defense
#   c70-c79   US PAT — Patent
#   c80-c89   US TAX — Tax
#   c90-c109  US LEI — Law Enforcement (double-wide)
#   c110-c119 US IMMG — Immigration
#   c120-c129 US FNC — Financial (overflows to c129)
#   c130-c139 US TRANS — Transportation
#   c140-c159 US LGL — Legal (double-wide, overflows original c140-c149)
#   c150-c159 US NUC — Nuclear (shares c150-c159 with LGL overflow)
#   c160-c169 US NCR — Natural and Cultural Resources
#   c170-c179 US STAT — Statistical
#   c180-c189 US INTL — International Agreements
#   c190-c199 RESERVED (future US groups)
#   c200-c299 CANADIAN PROTECTED (c203-c299 reserved for departmental use)
#   c300-c399 UK OFFICIAL (reserved — pending catalog)
#   c400-c499 AUSTRALIAN PSPF (reserved — pending catalog)
#   c500-c599 NEW ZEALAND PSR (reserved — pending catalog)
#   c600-c1023 Unallocated
#
#-------------------------------------------------------------------------
# SENSITIVITY LEVELS
#
# s0  SystemLow / General (lowest — binaries, libraries)
#     The sensitivity level alone does NOT imply controlled status.
#     Control is determined by category (e.g., c0 = CUI umbrella).
#
#     "s0="  Maps default sensitivity to null string (hides s0 from users)
#     "s0-s0:c0.c255=SystemLow-SystemHigh"  Maps default MCS range
#     "s0:c0.c255=SystemHigh"  Maps highest category level
#
# s1  Unclassified L1 — US CUI, Canadian PA, UK OFFICIAL, AU OFFICIAL, NZ OFFICIAL
#     s1:c0   = CUI base umbrella
#     s1:c200 = Canadian Protected A
#
#     Clearance example: a person cleared for both PA and CUI needs
#     s0-s1:c0,c200 (plus any specific CUI categories).
#
# s2  Unclassified L2 — Canadian PB, UK OFFICIAL-SENSITIVE, AU OFFICIAL:Sensitive
#     s2:c201 = Canadian Protected B
#
# s3  Unclassified L3 — Canadian PC, AU PROTECTED
#     s3:c202 = Canadian Protected C
#
#-------------------------------------------------------------------------
# Default setrans.conf
s0=
s0-s0:c0.c255=SystemLow-SystemHigh
s0:c0.c255=SystemHigh


# Bare sensitivity level with no category (fallback display)
s1=Generic Unclass L1
s2=Generic Unclass L2
s3=Generic Unclass L3

#-------------------------------------------------------------------------
