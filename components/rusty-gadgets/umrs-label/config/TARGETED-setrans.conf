#-------------------------------------------------------------------------
# SETRANS.CONF // TARGETED Policy
#
# MCS Category-to-Label translation for systems running targeted policy.
# In targeted policy, only s0 is available — there is no MLS enforcement.
# Categories still distinguish marking types, but sensitivity levels
# do not provide Bell-LaPadula dominance. Only type enforcement applies.
#
# Generated: 2026-03-30 from US-CUI-LABELS.json + CANADIAN-PROTECTED.json
#
#-------------------------------------------------------------------------
# USAGE EXAMPLES
#
# Assign the base CUI umbrella to a file:
#   chcon -l s0:c0 /some/path/file
#
# Assign CUI with Investigation marking:
#   chcon -l s0:c81 /some/path/file
#
# Using chcat:
#   chcat -L             List all categories
#   chcat -d file        Remove all categories
#   chcat <cat> file     Set categories
#
#-------------------------------------------------------------------------
# BLOCK ALLOCATION MAP — Five Eyes MCS Category Ranges
#
#   c0        US CUI base umbrella
#   c1-c12      CRIT — Critical Infrastructure (12)
#   c15-c21     DEF — Defense (7)
#   c25-c27     EXPT — Export Control (3)
#   c30-c43     FNC — Financial (14)
#   c45-c51     IMMG — Immigration (7)
#   c55-c64     INTEL — Intelligence (10)
#   c68         INTL — International Agreements (1)
#   c70-c90     LEI — Law Enforcement (21)
#   c95-c110    LGL — Legal (16)
#   c115-c117   NCR — Natural and Cultural Resources (3)
#   c120-c127   NUC — Nuclear (8)
#   c130-c132   PAT — Patent (3)
#   c135-c149   PRIV — Privacy (15)
#   c155-c158   PROCURE — Procurement and Acquisition (4)
#   c160-c166   PROPIN — Proprietary Business Information (7)
#   c170-c174   STAT — Statistical (5)
#   c178-c181   TAX — Tax (4)
#   c185-c186   TRANS — Transportation (2)
#   c190-c249 RESERVED (future US index groups)
#   c250-c259 LDCs — Limited Dissemination Controls (10)
#   c266-c270 DoD Distribution Statements B-F (5)
#   c271-c279 RESERVED (future LDCs / distribution)
#   c280-c299 RESERVED
#   c300-c399 CANADIAN PROTECTED (c303-c399 reserved for departmental use)
#   c400-c499 UK OFFICIAL (reserved — pending catalog)
#   c500-c599 AUSTRALIAN PSPF (reserved — pending catalog)
#   c600-c1023 Unallocated
#
#-------------------------------------------------------------------------

