# Load the JSON parsing module
module(load="mmjsonparse")

# Define the template that dumps all remaining JSON metadata
template(name="umrs-stripped-json" type="string" string="%$!all-json%\n")

# Process logs from your Rust program
if $programname == 'umrs-mcs' then {
    
    # 1. Parse the structured data from the journal
    action(type="mmjsonparse")

    # 2. STRIP unwanted system noise (delete keys you don't need)
    unset $!_cap_effective;
    unset $!_transport;
    unset $!_selinux_context;
    unset $!_systemd_slice;
    unset $!_boot_id;
    unset $!_machine_id;
    unset $!_hostname;
    unset $!_prio;

    # 3. Write the cleaned JSON to your custom log file
    action(type="omfile" file="/var/log/umrs.log" template="umrs-stripped-json")
    
    # 4. Stop processing so these don't also go to /var/log/messages
    stop
}


