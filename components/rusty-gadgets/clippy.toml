# UMRS workspace-wide clippy configuration.
#
# Activated by `[workspace.lints.clippy]` in the root Cargo.toml and
# `[lints] workspace = true` in each member crate's Cargo.toml.
#
# The `disallowed-methods` list below flags calls to APIs that have a
# high-assurance UMRS equivalent. A warning is not a ban — the lint can be
# suppressed at a call site with:
#
#     #[allow(clippy::disallowed_methods, reason = "<why this call is safe here>")]
#
# The `reason = "…"` clause is required (clippy 1.81+). Every suppression is
# grep-able and reviewable.
#
# See docs/modules/devel/pages/file-operations-task.adoc for the
# traditional-vs-UMRS inventory that drives the first section below.

# ---------------------------------------------------------------------------
# File operations — use UMRS secure equivalents
# ---------------------------------------------------------------------------
disallowed-methods = [
    # -- Opening, reading, enumerating -------------------------------------
    { path = "std::fs::File::open",           reason = "Use umrs_selinux::secure_dirent::SecureDirent::from_path (TOCTOU-safe, fd-anchored)." },
    { path = "std::fs::read",                 reason = "No UMRS equivalent yet; if you need bytes from a file, open via SecureDirent and read from the fd." },
    { path = "std::fs::read_to_string",       reason = "For /proc use SecureReader<ProcfsText>; for /sys use SecureReader<SysfsText>; otherwise open via SecureDirent." },
    { path = "std::fs::read_dir",             reason = "Use umrs_selinux::utils::dirlist::list_directory." },
    { path = "std::fs::metadata",             reason = "Use SecureDirent::from_path; read fields from the returned struct." },
    { path = "std::fs::symlink_metadata",     reason = "Use SecureDirent::from_path; read fields from the returned struct." },
    { path = "std::fs::read_link",            reason = "No UMRS equivalent yet — flag the gap rather than rolling your own." },

    # -- DAC / xattrs (obtain via the typed wrappers, not raw syscalls) ----
    { path = "std::os::unix::fs::MetadataExt::mode",  reason = "Prefer SecureDirent::mode / FileMode helpers (is_world_writable, is_setuid, is_setgid, is_sticky)." },

    # ---------------------------------------------------------------------------
    # SEI CERT Rust — memory management (MEM00/MEM01/MEM02/MEM03)
    # Calls that leak, skip destructors, bypass initialization, or escape the
    # borrow checker. Suppressions require a documented justification.
    # ---------------------------------------------------------------------------
    { path = "std::mem::forget",              reason = "MEM00: skips Drop. If the resource truly outlives Rust, document why with #[allow(..., reason = ...)]." },
    { path = "std::mem::drop",                reason = "MEM00: dropping a value explicitly is almost always a sign of a lifetime-management mistake." },
    { path = "std::mem::ManuallyDrop::new",   reason = "MEM01: suppresses Drop. Prefer a newtype whose own Drop impl handles the resource correctly." },
    { path = "std::ptr::drop_in_place",       reason = "MEM01: raw pointer destructor invocation; only valid inside carefully-audited unsafe abstractions." },
    { path = "std::boxed::Box::leak",         reason = "MEM02: intentional memory leak. If truly required (global singletons, FFI), document the lifetime argument explicitly." },
    { path = "std::vec::Vec::leak",           reason = "MEM02: intentional memory leak. Almost always a sign the wrong container was chosen." },
    { path = "std::string::String::leak",     reason = "MEM02: intentional memory leak. Almost always a sign the wrong container was chosen." },
    { path = "std::mem::transmute",           reason = "MEM03: bypasses the type system. Prefer safe conversions; if unavoidable, justify with #[allow(..., reason = ...)]." },
    { path = "std::mem::uninitialized",       reason = "UB magnet. Use MaybeUninit with documented initialization instead." },
    { path = "std::mem::zeroed",              reason = "UB for many types. Use MaybeUninit with documented initialization instead." },
    { path = "std::hint::unreachable_unchecked", reason = "UB if reached. Use unreachable!() and rely on the compiler to optimize genuine invariants." },
    { path = "std::boxed::Box::from_raw",     reason = "Reconstructing ownership from a raw pointer — only valid inside carefully-audited unsafe abstractions." },
    { path = "std::vec::Vec::from_raw_parts", reason = "Reconstructing a Vec from raw parts — only valid inside carefully-audited unsafe abstractions." },
    { path = "std::string::String::from_raw_parts", reason = "Reconstructing a String from raw parts — only valid inside carefully-audited unsafe abstractions." },
    { path = "std::slice::from_raw_parts",    reason = "Raw-pointer slice construction; only valid inside carefully-audited unsafe abstractions." },
    { path = "std::slice::from_raw_parts_mut",reason = "Raw-pointer mutable slice construction; only valid inside carefully-audited unsafe abstractions." },
    { path = "std::str::from_utf8_unchecked", reason = "Bypasses UTF-8 validation. Use std::str::from_utf8 and handle the error, or document why the input is guaranteed valid." },

    # ---------------------------------------------------------------------------
    # Process control — libraries must not call these; binaries do so only
    # from main() with an explicit justification.
    # ---------------------------------------------------------------------------
    { path = "std::process::exit",            reason = "Skips Drop on live RAII resources. Return an exit code from main() instead." },
    { path = "std::process::abort",           reason = "Terminates without cleanup. Only valid in response to an already-observed unrecoverable invariant violation." },
]
