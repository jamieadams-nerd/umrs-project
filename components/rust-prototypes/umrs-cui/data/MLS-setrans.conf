s1:c1,c5 = CUI//PRIVACY/HEALTH    #  INSPECTOR GENERAL PROTECTED
s1:c1,c7 = CUI//PRIVACY/MIL       #  MILITARY PERSONNEL RECORDS 
s1:c1,c8 = CUI//PRIVACY/PERS      #  PERSONNEL RECORDS
s1:c1,c9 = CUI//PRIVACY/STUD      #  STUDENT RECORDS 


