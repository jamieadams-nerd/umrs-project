#-------------------------------------------------------------------------
# SETRANS.CONF // MLS Policy
#
# To assign an object, select the top-level category and optionally
# a subcategory. For example, To change assign the Law enforcement
# category for CUI, you would use c0:
#
# chcon -l s1:c0 /some/path/file
#
# To change it to Accident investigation, include c91. See below
#
# chcon -l s1:c0,91 /some/path/file
#
# You can also use the chcat command:
# 
# TODO: Add Canadian assingment example here
#
#-------------------------------------------------------------------------
#
# chcat -L       - List all categories
# chcat -d file  - Remove all categories
# chcat <cat> file Set categories
#
# chcat CUI//PRIVACY/CONTRACT /path/to/file
#
#  The label "CUI//PRIVACY/CONTRACT" can be in double quotes or not.
#
#  TODO: Add Canadian example here
#
#-------------------------------------------------------------------------
#
# s0 General operating system level  (lowest, things like binaries/libraries)
#
#  Helpful to understand clearance ranges:
#   "s0=" This maps the default sensitivity level (no categories) to a 
#         null string, which hides the "s0" label from users.
#
#   "s0-s0:c0.c255=SystemLow-SystemHigh" Maps the default MCS range to 
#         "SystemLow-SystemHigh".
#
#    "s0:c0.c255=SystemHigh" Maps the highest category level to "SystemHigh".
#
#-------------------------------------------------------------------------
#  s1 Unclassifed
#
#    s1:c0   = CUI Begins, U.S. Controlled Unclassified Informatoin (CUI)
#
#    s1:c200 = Canadian Protected A requirements
#
#    Clearance example, a person could read both Protection A and CUI
#    just ensure they have s0-s1:c0,c200 (plus any special CUI categories).
#
#-------------------------------------------------------------------------
#  s2 Unclassifed, more senstive
#
#    s2:c201 = Canadian Protected B requirements
#
#-------------------------------------------------------------------------
#  s3 Unclassifed, most senstive
#
#    s3:c202 = Canadian Protected C requirements
#
#-------------------------------------------------------------------------
# Default setrans.conf
s0=
s0-s0:c0.c255=SystemLow-SystemHigh
s0:c0.c255=SystemHigh


# If a file just has sX but no category? Hope not. 
s1=Generic Unclass L1
s2=Generic Unclass L2
s3=Generic Unclass L3

#-------------------------------------------------------------------------
# BASE CUI UMBRELLA
s1:c0 = CUI                       # Controlled Unclassified Information


#-------------------------------------------------------------------------
