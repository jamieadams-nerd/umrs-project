# AGRICULTURE (AGR)
#
# The comments are too long. So, let's just show them here for reference.
# c111=AMNT    # Ammonium Nitrate (Note: Often also under CRIT group in NARA registry)
# c112=CHEM    # Chemical-terrorism Vulnerability Information (Often under CRIT group)
# c113=PCI     # Protected Critical Infrastructure Information (Often under CRIT group)
# c114=TOX     # Toxic Substances (Often under CRIT group)
# c115=WATER   # Water Assessments (Often under CRIT group)

# Subcategories and Markings
