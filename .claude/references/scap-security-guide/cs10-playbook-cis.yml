      owner: root
      group: root
      mode: '0644'
      line: cipher@SSH = -3DES-CBC -AES-128-CBC -AES-192-CBC -AES-256-CBC
      create: true
      regexp: cipher@SSH
    tags:
    - configure_custom_crypto_policy_cis
    - configure_strategy
    - low_complexity
