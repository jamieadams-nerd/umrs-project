    ansible.builtin.lineinfile:
      path: /etc/crypto-policies/policies/modules/NO-SSHCBC.pmod
      owner: root
      group: root
      mode: '0644'
      line: cipher@SSH = -*-CBC
      create: true
      regexp: cipher@SSH
    tags:
    - configure_custom_crypto_policy_cis
