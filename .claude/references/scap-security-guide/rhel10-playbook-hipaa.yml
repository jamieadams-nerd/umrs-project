    - CCE-90413-6
    - enable_strategy
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - sebool_selinuxuser_execheap

  - name: Enable the selinuxuser_execmod SELinux Boolean - Ensure python3-libsemanage
