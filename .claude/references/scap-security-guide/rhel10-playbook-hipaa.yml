      or ansible_facts.selinux.status != "disabled" )
    tags:
    - CCE-86922-2
    - enable_strategy
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - sebool_selinuxuser_execmod

  - name: Disable the selinuxuser_execstack SELinux Boolean - Ensure python3-libsemanage
