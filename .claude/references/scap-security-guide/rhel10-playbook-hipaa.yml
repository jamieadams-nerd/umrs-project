    - low_disruption
    - medium_severity
    - no_reboot_needed
    - service_cron_enabled
    - special_service_block
    when: '"kernel-core" in ansible_facts.packages'

  - name: Enable cron Service - Enable service crond
    block:

    - name: Enable cron Service - Enable Service crond
      ansible.builtin.systemd:
        name: crond
        enabled: true
        state: started
        masked: false
      when:
      - '"cronie" in ansible_facts.packages'
    tags:
