    ansible.builtin.package:
      name: rsyslog
      state: present
    when: '"kernel-core" in ansible_facts.packages'
    tags:
    - CCE-90353-4
    - NIST-800-53-CM-6(a)
    - enable_strategy
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - package_rsyslog_installed

  - name: Disable the selinuxuser_execheap SELinux Boolean - Ensure python3-libsemanage
